<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browse — BTS Bootcamp</title>
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/home.css" />
</head>
<body>
  <nav>
    <a href="../mainmuster.html">← Home</a>
    <a href="../mainmuster.html"><strong>BTS Bootcamp</strong></a>
  </nav>

  <main>
    <div id="era-carousel"></div>

    <div id="filters">
      <div id="type-dropdown-wrap">
        <button id="type-toggle">Type ▾</button>
        <div id="type-menu" class="hidden"></div>
      </div>
      <div id="member-dropdown-wrap">
        <button id="member-toggle">Member ▾</button>
        <div id="member-menu" class="hidden"></div>
      </div>
      <div id="dropdowns">
        <div class="range-group">
          <label>Era</label>
          <select id="era-from"><option value="">From</option></select>
          <span>→</span>
          <select id="era-to"><option value="">To</option></select>
        </div>
        <div class="range-group">
          <label>Year</label>
          <select id="year-from"><option value="">From</option></select>
          <span>→</span>
          <select id="year-to"><option value="">To</option></select>
        </div>
      </div>
    </div>

    <div id="active-filters"></div>
    <div id="results"><p>Loading...</p></div>
  </main>

  <script>
    // ── state (URL-driven — filters are bookmarkable and shareable) ──────────
    const MEMBERS = ["RM", "Jin", "Suga", "J-Hope", "Jimin", "V", "Jungkook"];

    const state = {
      types:    new Set(),
      members:  new Set(),
      eraFrom:  null,
      eraTo:    null,
      yearFrom: null,
      yearTo:   null,
    };

    let ALL_VIDEOS = [];
    let ALL_ERAS   = [];
    let ALL_TYPES  = [];

    // ── URL param sync ───────────────────────────────────────────────────────
    function readFromURL() {
      const p = new URLSearchParams(window.location.search);
      state.types.clear();
      state.members.clear();
      (p.get("types")   || "").split(",").filter(Boolean).forEach(t => state.types.add(t));
      (p.get("members") || "").split(",").filter(Boolean).forEach(m => state.members.add(m));
      state.eraFrom  = p.get("eraFrom")  || null;
      state.eraTo    = p.get("eraTo")    || null;
      state.yearFrom = p.get("yearFrom") || null;
      state.yearTo   = p.get("yearTo")   || null;
    }

    function pushToURL() {
      const p = new URLSearchParams();
      if (state.types.size)   p.set("types",   [...state.types].join(","));
      if (state.members.size) p.set("members", [...state.members].join(","));
      if (state.eraFrom)     p.set("eraFrom",  state.eraFrom);
      if (state.eraTo)       p.set("eraTo",    state.eraTo);
      if (state.yearFrom)    p.set("yearFrom", state.yearFrom);
      if (state.yearTo)      p.set("yearTo",   state.yearTo);
      const qs = p.toString();
      history.replaceState(null, "", qs ? `?${qs}` : window.location.pathname);
    }

    // ── utils ────────────────────────────────────────────────────────────────
    function fmtViews(n) {
      if (!n) return "";
      if (n >= 1e9) return (n / 1e9).toFixed(1) + "B";
      if (n >= 1e6) return (n / 1e6).toFixed(1) + "M";
      if (n >= 1e3) return (n / 1e3).toFixed(1) + "K";
      return n.toString();
    }

    function eraIndex(name) {
      return ALL_ERAS.findIndex(e => e.name === name);
    }

    function scoreVideo(v) {
      return Math.log10((v.view_count || 0) + 1) * 0.7 +
             Math.log10((v.like_count || 0) + 1) * 0.3;
    }

    // ── filtering ────────────────────────────────────────────────────────────
    function applyFilters() {
      const fromIdx = state.eraFrom ? eraIndex(state.eraFrom) : -Infinity;
      const toIdx   = state.eraTo   ? eraIndex(state.eraTo)   :  Infinity;

      return ALL_VIDEOS.filter(v => {
        if (v.status !== "active") return false;
        if (state.types.size && !state.types.has(v.type) && !(v.tags || []).some(t => state.types.has(t))) return false;
        if (state.members.size && !(v.members || []).some(m => state.members.has(m))) return false;

        if (state.eraFrom || state.eraTo) {
          const idx = eraIndex(v.era);
          if (idx === -1 || idx < fromIdx || idx > toIdx) return false;
        }

        const year = v.air_date ? parseInt(v.air_date.slice(0, 4)) : null;
        if (state.yearFrom && (!year || year < parseInt(state.yearFrom))) return false;
        if (state.yearTo   && (!year || year > parseInt(state.yearTo)))   return false;

        return true;
      }).sort((a, b) => scoreVideo(b) - scoreVideo(a));
    }

    function isFiltered() {
      return state.types.size || state.members.size || state.eraFrom || state.eraTo || state.yearFrom || state.yearTo;
    }

    // ── filter controls ──────────────────────────────────────────────────────
    function renderTypeDropdown() {
      const badge = state.types.size ? `<span id="type-badge">${state.types.size}</span>` : "";
      document.getElementById("type-toggle").innerHTML = `Type ${badge} ▾`;

      document.getElementById("type-menu").innerHTML = ALL_TYPES.map(t => `
        <label class="type-option">
          <input type="checkbox" value="${t}" ${state.types.has(t) ? "checked" : ""} /> ${t}
        </label>`).join("");

      document.getElementById("type-menu").querySelectorAll("input").forEach(cb => {
        cb.addEventListener("change", () => {
          cb.checked ? state.types.add(cb.value) : state.types.delete(cb.value);
          render();
        });
      });

      document.getElementById("type-toggle").onclick = e => {
        e.stopPropagation();
        document.getElementById("type-menu").classList.toggle("hidden");
      };
    }

    function renderMemberDropdown() {
      const badge = state.members.size ? `<span id="member-badge">${state.members.size}</span>` : "";
      document.getElementById("member-toggle").innerHTML = `Member ${badge} ▾`;

      document.getElementById("member-menu").innerHTML = MEMBERS.map(m => `
        <label class="type-option">
          <input type="checkbox" value="${m}" ${state.members.has(m) ? "checked" : ""} /> ${m}
        </label>`).join("");

      document.getElementById("member-menu").querySelectorAll("input").forEach(cb => {
        cb.addEventListener("change", () => {
          cb.checked ? state.members.add(cb.value) : state.members.delete(cb.value);
          render();
        });
      });

      document.getElementById("member-toggle").onclick = e => {
        e.stopPropagation();
        document.getElementById("type-menu").classList.add("hidden");
        document.getElementById("member-menu").classList.toggle("hidden");
      };
    }

    function populateEraSelects() {
      const opts = ALL_ERAS.map(e => `<option value="${e.name}">${e.name}</option>`).join("");
      document.getElementById("era-from").innerHTML = `<option value="">From</option>${opts}`;
      document.getElementById("era-to").innerHTML   = `<option value="">To</option>${opts}`;
      document.getElementById("era-from").value = state.eraFrom || "";
      document.getElementById("era-to").value   = state.eraTo   || "";
    }

    function populateYearSelects() {
      const years = [...new Set(ALL_VIDEOS.filter(v => v.air_date).map(v => v.air_date.slice(0, 4)))].sort();
      const opts  = years.map(y => `<option value="${y}">${y}</option>`).join("");
      document.getElementById("year-from").innerHTML = `<option value="">From</option>${opts}`;
      document.getElementById("year-to").innerHTML   = `<option value="">To</option>${opts}`;
      document.getElementById("year-from").value = state.yearFrom || "";
      document.getElementById("year-to").value   = state.yearTo   || "";
    }

    function bindDropdowns() {
      document.getElementById("era-from").addEventListener("change",  e => { state.eraFrom  = e.target.value || null; render(); });
      document.getElementById("era-to").addEventListener("change",    e => { state.eraTo    = e.target.value || null; render(); });
      document.getElementById("year-from").addEventListener("change", e => { state.yearFrom = e.target.value || null; render(); });
      document.getElementById("year-to").addEventListener("change",   e => { state.yearTo   = e.target.value || null; render(); });
    }

    // ── active filter tags ───────────────────────────────────────────────────
    function renderActiveFilters() {
      const tags = [];
      state.types.forEach(t   => tags.push(`<span class="tag">${t} <button data-clear="type" data-value="${t}">×</button></span>`));
      state.members.forEach(m => tags.push(`<span class="tag">${m} <button data-clear="member" data-value="${m}">×</button></span>`));
      if (state.eraFrom)  tags.push(`<span class="tag">Era from: ${state.eraFrom} <button data-clear="eraFrom">×</button></span>`);
      if (state.eraTo)    tags.push(`<span class="tag">Era to: ${state.eraTo} <button data-clear="eraTo">×</button></span>`);
      if (state.yearFrom) tags.push(`<span class="tag">From ${state.yearFrom} <button data-clear="yearFrom">×</button></span>`);
      if (state.yearTo)   tags.push(`<span class="tag">To ${state.yearTo} <button data-clear="yearTo">×</button></span>`);

      const el = document.getElementById("active-filters");
      if (tags.length) {
        el.innerHTML = `<div id="tag-row">${tags.join("")} <button id="clear-all">Clear all</button></div>`;
        el.querySelector("#clear-all").addEventListener("click", () => {
          state.types.clear();
          state.members.clear();
          state.eraFrom = state.eraTo = state.yearFrom = state.yearTo = null;
          render();
        });
      } else {
        el.innerHTML = `<p class="browse-hint">Select filters above to search the archive.</p>`;
      }

      el.querySelectorAll("[data-clear]").forEach(btn => {
        btn.addEventListener("click", () => {
          const k = btn.dataset.clear, val = btn.dataset.value;
          if (k === "type")   state.types.delete(val);
          else if (k === "member") state.members.delete(val);
          else state[k] = null;
          render();
        });
      });
    }

    // ── results ──────────────────────────────────────────────────────────────
    function renderCard(v) {
      const meta = [v.era, fmtViews(v.view_count) ? fmtViews(v.view_count) + " views" : ""].filter(Boolean).join(" · ");
      return `
        <a class="card" href="player.html?id=${encodeURIComponent(v.id)}">
          <img src="${v.thumbnail}" alt="${v.title}" loading="lazy" />
          <p class="card-title">${v.title}</p>
          ${meta ? `<p class="card-meta">${meta}</p>` : ""}
        </a>`;
    }

    function renderResults() {
      if (!isFiltered()) {
        document.getElementById("results").innerHTML = "";
        return;
      }
      const filtered = applyFilters();
      if (!filtered.length) {
        document.getElementById("results").innerHTML = `<p class="empty">No videos match these filters.</p>`;
        return;
      }
      const disclaimer = state.types.has("Run BTS") && state.types.size === 1
        ? `<p class="disclaimer">Run BTS originally aired on V LIVE and is not sorted by era.</p>`
        : "";
      document.getElementById("results").innerHTML = `
        <div id="results-header"><span>${filtered.length.toLocaleString()} videos</span></div>
        ${disclaimer}
        <div id="grid">${filtered.map(renderCard).join("")}</div>`;
    }

    // ── era carousel ─────────────────────────────────────────────────────────
    function renderEraCarousel() {
      const active = ALL_VIDEOS.filter(v => v.status === "active");
      const pills  = ALL_ERAS.map(era => {
        const count    = active.filter(v => v.era === era.name).length;
        if (!count) return "";
        const selected = state.eraFrom === era.name && state.eraTo === era.name;
        return `<button class="era-pill${selected ? " active" : ""}" data-era="${era.name}">
          ${era.name}
          <span class="era-pill-count">${count}</span>
        </button>`;
      }).join("");

      document.getElementById("era-carousel").innerHTML =
        `<div id="era-rail">${pills}</div>`;

      document.querySelectorAll(".era-pill").forEach(btn => {
        btn.addEventListener("click", () => {
          const era = btn.dataset.era;
          // toggle off if already selected
          if (state.eraFrom === era && state.eraTo === era) {
            state.eraFrom = state.eraTo = null;
          } else {
            state.eraFrom = state.eraTo = era;
          }
          render();
        });
      });
    }

    // ── main render ──────────────────────────────────────────────────────────
    function render() {
      pushToURL();
      renderEraCarousel();
      renderTypeDropdown();
      renderMemberDropdown();
      populateEraSelects();
      populateYearSelects();
      bindDropdowns();
      renderActiveFilters();
      renderResults();
    }

    // ── boot ─────────────────────────────────────────────────────────────────
    document.addEventListener("click", () => {
      document.getElementById("type-menu")?.classList.add("hidden");
      document.getElementById("member-menu")?.classList.add("hidden");
    });

    Promise.all([
      fetch("../data/videos.json").then(r => r.json()),
      fetch("../data/eras.json").then(r => r.json()),
    ]).then(([videos, eras]) => {
      ALL_VIDEOS = videos;
      ALL_ERAS   = eras;
      ALL_TYPES  = [...new Set(videos.map(v => v.type))].sort();
      readFromURL();
      render();
    }).catch(err => {
      document.getElementById("results").innerHTML = `<p>Error: ${err.message}</p>`;
    });
  </script>
</body>
</html>
