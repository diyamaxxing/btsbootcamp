<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Watch — BTS Bootcamp</title>
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/home.css" />
  <link rel="stylesheet" href="../css/player.css" />
</head>
<body>
  <nav>
    <a href="../mainmuster.html">← Home</a>
  </nav>

  <main id="app">
    <p>Loading...</p>
  </main>

  <script>
    function ytId(url) {
      const m = url.match(/v=([a-zA-Z0-9_-]{11})/);
      return m ? m[1] : null;
    }

    function fmtViews(n) {
      if (!n) return "";
      if (n >= 1e9) return (n / 1e9).toFixed(1) + "B";
      if (n >= 1e6) return (n / 1e6).toFixed(1) + "M";
      if (n >= 1e3) return (n / 1e3).toFixed(1) + "K";
      return n.toString();
    }

    function scoreVideo(v) {
      return Math.log10((v.view_count || 0) + 1) * 0.7 +
             Math.log10((v.like_count || 0) + 1) * 0.3;
    }

    function typeMatch(a, b) {
      return a.type === b.type ||
             (a.tags || []).includes(b.type) ||
             (b.tags || []).includes(a.type);
    }

    // ── related pools ────────────────────────────────────────────────────────
    function buildPools(current, all) {
      const active = all.filter(v => v.status === "active" && v.id !== current.id);
      const seen   = new Set();

      // Up Next: same era + same type, scored
      const upNext = active
        .filter(v => v.era === current.era && typeMatch(v, current))
        .sort((a, b) => scoreVideo(b) - scoreVideo(a))
        .slice(0, 15);
      upNext.forEach(v => seen.add(v.id));

      // More from Era: same era, any type, not already shown
      const moreEra = current.era
        ? active
            .filter(v => v.era === current.era && !seen.has(v.id))
            .sort((a, b) => scoreVideo(b) - scoreVideo(a))
            .slice(0, 15)
        : [];
      moreEra.forEach(v => seen.add(v.id));

      // More [Type]: same type/tags, any era, not already shown
      const moreType = active
        .filter(v => typeMatch(v, current) && !seen.has(v.id))
        .sort((a, b) => scoreVideo(b) - scoreVideo(a))
        .slice(0, 15);

      return { upNext, moreEra, moreType };
    }

    // ── rendering ────────────────────────────────────────────────────────────
    function renderCard(v) {
      const id   = ytId(v.url);
      const meta = [v.era, fmtViews(v.view_count) ? fmtViews(v.view_count) + " views" : ""].filter(Boolean).join(" · ");
      return `
        <a class="card" href="player.html?id=${encodeURIComponent(v.id)}">
          <img src="https://img.youtube.com/vi/${id}/mqdefault.jpg" alt="${v.title}" loading="lazy" />
          <p class="card-title">${v.title}</p>
          ${meta ? `<p class="card-meta">${meta}</p>` : ""}
        </a>`;
    }

    function renderCarousel(title, videos) {
      if (!videos.length) return "";
      return `
        <div class="carousel">
          <h2>${title}</h2>
          <div class="rail">${videos.map(renderCard).join("")}</div>
        </div>`;
    }

    // ── boot ─────────────────────────────────────────────────────────────────
    const recordId = new URLSearchParams(window.location.search).get("id");

    fetch("../data/videos.json")
      .then(r => r.json())
      .then(videos => {
        const video = videos.find(v => v.id === recordId);
        if (!video) {
          document.getElementById("app").innerHTML = `<p>Video not found: ${recordId}</p>`;
          return;
        }

        const id = ytId(video.url);
        document.title = `${video.title} — BTS Bootcamp`;

        const { upNext, moreEra, moreType } = buildPools(video, videos);
        const metaLine = [video.type, video.era, video.air_date].filter(Boolean).join(" · ");

        document.getElementById("app").innerHTML = `
          <div id="player-layout">

            <div id="player-col">
              <div id="player-wrap">
                <iframe
                  src="https://www.youtube.com/embed/${id}?autoplay=1"
                  allow="autoplay; encrypted-media"
                  allowfullscreen>
                </iframe>
              </div>
              <div id="meta">
                <h1>${video.title}</h1>
                <p class="meta-line">${metaLine}</p>
                ${video.members?.length ? `<p class="meta-members">${video.members.join(", ")}</p>` : ""}
                ${video.view_count ? `<p class="meta-stats">${fmtViews(video.view_count)}M views · ${(video.like_count || 0).toLocaleString()} likes</p>` : ""}
                ${video.description ? `<p class="meta-desc">${video.description}</p>` : ""}
              </div>
              <div id="related">
                ${renderCarousel("Up Next", upNext)}
                ${moreEra.length  ? renderCarousel(`More from ${video.era}`, moreEra)   : ""}
                ${moreType.length ? renderCarousel(`More ${video.type}`,     moreType)  : ""}
              </div>
            </div>

            <aside id="comments-col">
              <h2 class="sidebar-heading">Comments</h2>
              <div id="comment-input-wrap">
                <input id="comment-input" type="text" placeholder="Comments coming soon…" disabled />
              </div>
              <div id="comment-list">
                <p class="comments-empty">Be the first to comment.</p>
              </div>
            </aside>

          </div>`;
      })
      .catch(err => {
        document.getElementById("app").innerHTML = `<p>Error: ${err.message}</p>`;
      });
  </script>
</body>
</html>
