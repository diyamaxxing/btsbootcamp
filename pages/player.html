<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Watch — BTS Bootcamp</title>
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/home.css" />
  <link rel="stylesheet" href="../css/player.css" />
</head>
<body>
  <nav>
    <a href="../mainmuster.html">← Home</a>
  </nav>

  <main id="app">
    <p>Loading...</p>
  </main>

  <script src="../js/auth.js"></script>
  <script src="../js/comments.js"></script>
  <script>
    function ytId(url) {
      const m = url.match(/v=([a-zA-Z0-9_-]{11})/);
      return m ? m[1] : null;
    }

    function fmtViews(n) {
      if (!n) return "";
      if (n >= 1e9) return (n / 1e9).toFixed(1) + "B";
      if (n >= 1e6) return (n / 1e6).toFixed(1) + "M";
      if (n >= 1e3) return (n / 1e3).toFixed(1) + "K";
      return n.toString();
    }

    function scoreVideo(v) {
      return Math.log10((v.view_count || 0) + 1) * 0.7 +
             Math.log10((v.like_count || 0) + 1) * 0.3;
    }

    // Checked both directions (a's tags vs b's type, and vice versa) so
    // cross-tagged videos (e.g. Bangtan Bombs tagged "Dance Practice") match
    // against both real Dance Practice videos and other Bangtan Bombs.
    function typeMatch(a, b) {
      return a.type === b.type ||
             (a.tags || []).includes(b.type) ||
             (b.tags || []).includes(a.type);
    }

    // ── recommendation river ─────────────────────────────────────────────────
    // Each pool pulls from what hasn't been shown yet, relevance degrades as you go.
    function buildRecommendations(current, all, eras) {
      const active = all.filter(v => v.status === "active" && v.id !== current.id);
      // Shared across every pool() call below — once a video appears in one
      // carousel (e.g. "Up Next"), it's excluded from every carousel after
      // it, so the same video never shows up twice down the page.
      const shown  = new Set();

      function pool(filter, sort, n) {
        const results = active.filter(v => !shown.has(v.id) && filter(v))
          .sort(sort)
          .slice(0, n);
        results.forEach(v => shown.add(v.id));
        return results;
      }

      const byScore  = (a, b) => scoreVideo(b) - scoreVideo(a);
      const byLikes  = (a, b) => (b.like_count || 0) - (a.like_count || 0);
      const eraIdx   = name => eras.findIndex(e => e.name === name);
      const curIdx   = eraIdx(current.era);

      const carousels = [];

      // 0. same song/release, any type or era — the strongest relevance
      // signal there is. An MV, its dance practice, and a bomb about its
      // jacket shoot are all clearly related even though they're totally
      // different content types, so this runs before "Up Next" rather than
      // being folded into the type/era-based pools below. `song` is
      // extracted from the quoted title substring in build_videos_json.py —
      // see CATEGORY_PATTERNS/SONG_PATTERN there for how it's derived.
      if (current.song) {
        const sameSong = pool(v => v.song === current.song, byScore, 15);
        if (sameSong.length) carousels.push({ title: `More '${current.song}'`, videos: sameSong });
      }

      // 1. tightest — same era + same type
      const upNext = pool(v => v.era === current.era && typeMatch(v, current), byScore, 15);
      if (upNext.length) carousels.push({ title: "Up Next", videos: upNext });

      // 2. same era, any type
      if (current.era) {
        const moreEra = pool(v => v.era === current.era, byScore, 15);
        if (moreEra.length) carousels.push({ title: `More from ${current.era}`, videos: moreEra });
      }

      // 3. same type, any era
      const moreType = pool(v => typeMatch(v, current), byScore, 15);
      if (moreType.length) carousels.push({ title: `More ${current.type}`, videos: moreType });

      // 4. same members (only meaningful when video has a subset of the group)
      const currentMembers = current.members || [];
      if (currentMembers.length > 0 && currentMembers.length < 7) {
        const withMembers = pool(
          v => currentMembers.some(m => (v.members || []).includes(m)),
          byScore, 15
        );
        const label = currentMembers.length === 1
          ? `More with ${currentMembers[0]}`
          : `More with ${currentMembers.slice(0, -1).join(", ")} & ${currentMembers.at(-1)}`;
        if (withMembers.length) carousels.push({ title: label, videos: withMembers });
      }

      // 5/6. fan favorites — same type sorted by likes (numbering matches
      // the 9-carousel spec in CLAUDE.md, which lists this as both #5 and a
      // renumbered #6 — only one carousel is actually built here)
      const loved = pool(v => typeMatch(v, current), byLikes, 15);
      if (loved.length) carousels.push({ title: `Fan Favorites: ${current.type}`, videos: loved });

      // 7. nearby eras (±1–2 steps in the era list)
      if (curIdx !== -1) {
        const nearbyEraNames = eras
          .filter((_, i) => i !== curIdx && Math.abs(i - curIdx) <= 2)
          .map(e => e.name);
        const nearby = pool(v => nearbyEraNames.includes(v.era), byScore, 15);
        if (nearby.length) carousels.push({ title: "From Nearby Eras", videos: nearby });
      }

      // 8. most loved overall
      const mostLoved = pool(() => true, byLikes, 15);
      if (mostLoved.length) carousels.push({ title: "Most Loved", videos: mostLoved });

      // 9. trending overall — whatever's left
      const trending = pool(() => true, byScore, 15);
      if (trending.length) carousels.push({ title: "Trending", videos: trending });

      return carousels;
    }

    // ── card + carousel ──────────────────────────────────────────────────────
    // Two different IDs are in play per video: v.id is this catalog's own
    // identifier (used in player.html's own ?id= link), while ytId(v.url)
    // extracts the actual YouTube video ID (used only for the thumbnail URL).
    function renderCard(v) {
      const id   = ytId(v.url);
      const meta = [v.era, fmtViews(v.view_count) ? fmtViews(v.view_count) + " views" : ""].filter(Boolean).join(" · ");
      return `
        <a class="card" href="player.html?id=${encodeURIComponent(v.id)}">
          <img src="https://img.youtube.com/vi/${id}/mqdefault.jpg" alt="${v.title}" loading="lazy" />
          <p class="card-title">${v.title}</p>
          ${meta ? `<p class="card-meta">${meta}</p>` : ""}
        </a>`;
    }

    function renderCarousel(title, videos) {
      return `
        <div class="carousel">
          <h2>${title} <span class="count">${videos.length}</span></h2>
          <div class="rail">${videos.map(renderCard).join("")}</div>
        </div>`;
    }

    // ── comments ─────────────────────────────────────────────────────────────
    // Flat, per-video list — no interval bucketing yet (see js/comments.js).
    function fmtCommentTime(iso) {
      return new Date(iso).toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" });
    }

    // `pending: true` marks a just-submitted, not-yet-promoted comment shown
    // optimistically — promotion isn't instant, same as signups.
    function renderComment(c) {
      const time = c.pending ? "Posting…" : fmtCommentTime(c.posted_at);
      return `
        <div class="comment-item${c.pending ? " comment-pending" : ""}">
          <p class="comment-author">${c.username}</p>
          <p class="comment-text">${c.comment}</p>
          <p class="comment-time">${time}</p>
        </div>`;
    }

    function renderCommentList(list) {
      if (!list.length) return `<p class="comments-empty">Be the first to comment.</p>`;
      return list.map(renderComment).join("");
    }

    // Wires the (now-enabled) comment input once its markup is in the DOM.
    // Not logged in: saves the draft and sends the visitor to log in/sign
    // up — profile.html auto-posts it on successful login. Logged in:
    // posts for real and shows it optimistically at the top of the list.
    function wireCommentInput(videoId) {
      const input = document.getElementById("comment-input");
      const errorEl = document.getElementById("comment-error");

      input.addEventListener("keydown", async (e) => {
        if (e.key !== "Enter") return;
        const value = input.value;
        if (!value.trim()) return;

        if (!getSession()) {
          saveDraftComment({ videoId, comment: value });
          window.location.href = "profile.html";
          return;
        }

        errorEl.textContent = "";
        input.disabled = true;
        try {
          const username = getSession();
          await createComment({ videoId, username, comment: value });
          input.value = "";
          const list = document.getElementById("comment-list");
          const empty = list.querySelector(".comments-empty");
          if (empty) empty.remove();
          list.insertAdjacentHTML("afterbegin", renderComment({ username, comment: value.trim(), pending: true }));
        } catch (err) {
          errorEl.textContent = err.message;
        } finally {
          input.disabled = false;
        }
      });
    }

    // ── boot ─────────────────────────────────────────────────────────────────
    const recordId = new URLSearchParams(window.location.search).get("id");

    Promise.all([
      fetch("../data/videos.json").then(r => r.json()),
      fetch("../data/eras.json").then(r => r.json()),
      loadComments(),
    ]).then(([videos, eras, comments]) => {
      const video = videos.find(v => v.id === recordId);
      if (!video) {
        document.getElementById("app").innerHTML = `<p>Video not found: ${recordId}</p>`;
        return;
      }

      const id = ytId(video.url);
      document.title = `${video.title} — BTS Bootcamp`;

      const recs     = buildRecommendations(video, videos, eras);
      const metaLine = [video.type, video.era, video.air_date].filter(Boolean).join(" · ");

      document.getElementById("app").innerHTML = `
        <div id="top-section">
          <div id="player-wrap">
            <iframe
              src="https://www.youtube.com/embed/${id}?autoplay=1"
              allow="autoplay; encrypted-media"
              allowfullscreen>
            </iframe>
          </div>
          <aside id="comments-col">
            <h2 class="sidebar-heading">Comments</h2>
            <div id="comment-input-wrap">
              <input id="comment-input" type="text" placeholder="${getSession() ? "Add a comment…" : "Log in to comment…"}" />
            </div>
            <p id="comment-error" class="comment-error"></p>
            <div id="comment-list">${renderCommentList(commentsForVideo(comments, video.id))}</div>
          </aside>
        </div>

        <div id="meta">
          <h1>${video.title}</h1>
          <p class="meta-line">${metaLine}</p>
          ${video.members?.length ? `<p class="meta-members">${video.members.join(", ")}</p>` : ""}
          ${video.view_count ? `<p class="meta-stats">${fmtViews(video.view_count)} views · ${(video.like_count || 0).toLocaleString()} likes</p>` : ""}
          ${video.description ? `<p class="meta-desc">${video.description}</p>` : ""}
        </div>

        <div id="recommendations">
          ${recs.map(r => renderCarousel(r.title, r.videos)).join("")}
        </div>`;

      wireCommentInput(video.id);
    }).catch(err => {
      document.getElementById("app").innerHTML = `<p>Error: ${err.message}</p>`;
    });
  </script>
</body>
</html>
