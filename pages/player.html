<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Watch — BTS Bootcamp</title>
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/player.css" />
</head>
<body>
  <nav>
    <a href="../mainmuster.html">← Home</a>
  </nav>

  <main id="app">
    <p>Loading...</p>
  </main>

  <script>
    function videoId(url) {
      const m = url.match(/v=([a-zA-Z0-9_-]{11})/);
      return m ? m[1] : null;
    }

    const params = new URLSearchParams(window.location.search);
    const recordId = params.get("id");

    fetch("../data/videos.json")
      .then(r => r.json())
      .then(videos => {
        const video = videos.find(v => v.id === recordId);
        if (!video) {
          document.getElementById("app").innerHTML = `<p>Video not found: ${recordId}</p>`;
          return;
        }

        const ytId = videoId(video.url);
        document.title = `${video.title} — BTS Bootcamp`;

        document.getElementById("app").innerHTML = `
          <div id="player-wrap">
            <iframe
              src="https://www.youtube.com/embed/${ytId}?autoplay=1"
              allow="autoplay; encrypted-media"
              allowfullscreen>
            </iframe>
          </div>
          <div id="meta">
            <h1>${video.title}</h1>
            <p>${[video.type, video.era, video.air_date].filter(Boolean).join(" · ")}</p>
            <p>${video.members ? video.members.join(", ") : ""}</p>
            ${video.description ? `<p>${video.description}</p>` : ""}
          </div>`;
      })
      .catch(err => {
        document.getElementById("app").innerHTML = `<p>Error: ${err.message}</p>`;
      });
  </script>
</body>
</html>
