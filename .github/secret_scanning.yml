# js/auth.js and js/comments.js each intentionally embed a fine-grained
# GitHub PAT scoped to exactly one staging repo (burnthestage / campcomments)
# with only contents:write there — safe to expose client-side by design.
# See ARCHITECTURE_DECISIONS.md for the full write-isolation rationale.
paths-ignore:
  - "js/auth.js"
  - "js/comments.js"
