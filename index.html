<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BTS Bootcamp</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/home.css" />
</head>
<body>
  <nav>
    <a href="index.html"><strong>BTS Bootcamp</strong></a>
  </nav>

  <main>
    <div id="stats-bar"></div>

    <div id="filters">
      <div id="type-dropdown-wrap">
        <button id="type-toggle">Type <span id="type-badge"></span>▾</button>
        <div id="type-menu" class="hidden"></div>
      </div>
      <div id="dropdowns">
        <div class="range-group">
          <label>Era</label>
          <select id="era-from"><option value="">From</option></select>
          <span>→</span>
          <select id="era-to"><option value="">To</option></select>
        </div>
        <div class="range-group">
          <label>Year</label>
          <select id="year-from"><option value="">From</option></select>
          <span>→</span>
          <select id="year-to"><option value="">To</option></select>
        </div>
      </div>
    </div>

    <div id="active-filters"></div>
    <div id="results"></div>
  </main>

  <script>
    // ── state ────────────────────────────────────────────────────────────────
    const state = {
      types:   new Set(),   // empty = all types shown
      eraFrom: null,
      eraTo:   null,
      yearFrom: null,
      yearTo:   null,
    };

    let ALL_VIDEOS = [];
    let ALL_ERAS   = [];
    let ALL_TYPES  = [];    // derived from data on boot

    // ── utils ────────────────────────────────────────────────────────────────
    function fmtHours(sec) {
      const h = Math.floor(sec / 3600);
      const m = Math.floor((sec % 3600) / 60);
      return `${h.toLocaleString()}h ${m}m`;
    }

    function eraIndex(eraName) {
      return ALL_ERAS.findIndex(e => e.name === eraName);
    }

    function applyFilters(videos) {
      const fromIdx = state.eraFrom ? eraIndex(state.eraFrom) : -Infinity;
      const toIdx   = state.eraTo   ? eraIndex(state.eraTo)   :  Infinity;

      return videos.filter(v => {
        if (v.status !== "active") return false;
        if (state.types.size && !state.types.has(v.type)) return false;

        // era range
        if (state.eraFrom || state.eraTo) {
          const idx = eraIndex(v.era);
          if (idx === -1) return false;
          if (idx < fromIdx || idx > toIdx) return false;
        }

        // year range
        const year = v.air_date ? parseInt(v.air_date.slice(0, 4)) : null;
        if (state.yearFrom && (!year || year < parseInt(state.yearFrom))) return false;
        if (state.yearTo   && (!year || year > parseInt(state.yearTo)))   return false;

        return true;
      });
    }

    function isFiltered() {
      return state.types.size || state.eraFrom || state.eraTo || state.yearFrom || state.yearTo;
    }

    // ── stats bar ────────────────────────────────────────────────────────────
    function renderStats() {
      const active   = ALL_VIDEOS.filter(v => v.status === "active");
      const totalSec = active.reduce((s, v) => s + (v.duration_sec || 0), 0);
      const eras     = new Set(active.map(v => v.era).filter(Boolean)).size;
      const since    = active.filter(v => v.air_date).sort((a, b) => a.air_date.localeCompare(b.air_date))[0];

      const typeCounts = ALL_TYPES.map(t => {
        const n = active.filter(v => v.type === t).length;
        return `<div class="stat"><span class="stat-num">${n.toLocaleString()}</span><span class="stat-label">${t}s</span></div>`;
      }).join("");

      document.getElementById("stats-bar").innerHTML = `
        <section id="stats">
          <div class="stat"><span class="stat-num">${active.length.toLocaleString()}</span><span class="stat-label">Videos</span></div>
          ${typeCounts}
          <div class="stat"><span class="stat-num">${fmtHours(totalSec)}</span><span class="stat-label">Total Runtime</span></div>
          <div class="stat"><span class="stat-num">${eras}</span><span class="stat-label">Eras</span></div>
          <div class="stat"><span class="stat-num">${since ? since.air_date.slice(0, 4) : "—"}</span><span class="stat-label">Since</span></div>
        </section>`;
    }

    // ── filter controls ──────────────────────────────────────────────────────
    function renderTypeDropdown() {
      const badge  = state.types.size ? `<span id="type-badge">${state.types.size}</span>` : "";
      document.getElementById("type-toggle").innerHTML = `Type ${badge} ▾`;

      const items = ALL_TYPES.map(t => {
        const checked = state.types.has(t) ? "checked" : "";
        return `<label class="type-option">
          <input type="checkbox" value="${t}" ${checked} /> ${t}
        </label>`;
      }).join("");
      document.getElementById("type-menu").innerHTML = items;

      document.getElementById("type-menu").querySelectorAll("input").forEach(cb => {
        cb.addEventListener("change", () => {
          cb.checked ? state.types.add(cb.value) : state.types.delete(cb.value);
          render();
        });
      });

      // toggle open/close
      const toggle = document.getElementById("type-toggle");
      toggle.onclick = (e) => {
        e.stopPropagation();
        document.getElementById("type-menu").classList.toggle("hidden");
      };
    }

    function populateEraSelects() {
      const options = ALL_ERAS.map(e => `<option value="${e.name}">${e.name}</option>`).join("");
      document.getElementById("era-from").innerHTML = `<option value="">From</option>${options}`;
      document.getElementById("era-to").innerHTML   = `<option value="">To</option>${options}`;
      document.getElementById("era-from").value = state.eraFrom || "";
      document.getElementById("era-to").value   = state.eraTo   || "";
    }

    function populateYearSelects() {
      const years = [...new Set(
        ALL_VIDEOS.filter(v => v.air_date).map(v => v.air_date.slice(0, 4))
      )].sort();
      const options = years.map(y => `<option value="${y}">${y}</option>`).join("");
      document.getElementById("year-from").innerHTML = `<option value="">From</option>${options}`;
      document.getElementById("year-to").innerHTML   = `<option value="">To</option>${options}`;
      document.getElementById("year-from").value = state.yearFrom || "";
      document.getElementById("year-to").value   = state.yearTo   || "";
    }

    function bindDropdowns() {
      document.getElementById("era-from").addEventListener("change",  e => { state.eraFrom  = e.target.value || null; render(); });
      document.getElementById("era-to").addEventListener("change",    e => { state.eraTo    = e.target.value || null; render(); });
      document.getElementById("year-from").addEventListener("change", e => { state.yearFrom = e.target.value || null; render(); });
      document.getElementById("year-to").addEventListener("change",   e => { state.yearTo   = e.target.value || null; render(); });
    }

    // ── active filter tags ───────────────────────────────────────────────────
    function renderActiveFilters() {
      const tags = [];
      state.types.forEach(t => tags.push(typeTag(t)));
      if (state.eraFrom)  tags.push(tag(`Era from: ${state.eraFrom}`, "eraFrom"));
      if (state.eraTo)    tags.push(tag(`Era to: ${state.eraTo}`, "eraTo"));
      if (state.yearFrom) tags.push(tag(`From ${state.yearFrom}`, "yearFrom"));
      if (state.yearTo)   tags.push(tag(`To ${state.yearTo}`, "yearTo"));

      const el = document.getElementById("active-filters");
      if (tags.length) {
        el.innerHTML = `<div id="tag-row">${tags.join("")} <button id="clear-all">Clear all</button></div>`;
        el.querySelector("#clear-all").addEventListener("click", () => {
          state.types.clear();
          state.eraFrom = state.eraTo = state.yearFrom = state.yearTo = null;
          render();
        });
      } else {
        el.innerHTML = "";
      }

      el.querySelectorAll("[data-clear]").forEach(btn => {
        btn.addEventListener("click", () => {
          const k = btn.dataset.clear;
          if (k === "type") state.types.delete(btn.dataset.value);
          else state[k] = null;
          render();
        });
      });
    }

    function tag(label, clearKey) {
      return `<span class="tag">${label} <button data-clear="${clearKey}">×</button></span>`;
    }

    function typeTag(t) {
      return `<span class="tag">${t} <button data-clear="type" data-value="${t}">×</button></span>`;
    }

    // ── cards ────────────────────────────────────────────────────────────────
    function renderCard(v) {
      return `
        <a class="card" href="pages/player.html?id=${encodeURIComponent(v.id)}">
          <img src="${v.thumbnail}" alt="${v.title}" loading="lazy" />
          <p class="card-title">${v.title}</p>
          ${v.era ? `<p class="card-meta">${v.era}</p>` : ""}
        </a>`;
    }

    // ── filtered: full page grid ─────────────────────────────────────────────
    function renderFiltered() {
      const filtered = applyFilters(ALL_VIDEOS);
      if (!filtered.length) {
        document.getElementById("results").innerHTML = `<p class="empty">No videos match these filters.</p>`;
        return;
      }
      const disclaimer = state.types.has("Run BTS") && state.types.size === 1
        ? `<p class="disclaimer">Run BTS originally aired on V LIVE and is not sorted by era.</p>`
        : "";
      document.getElementById("results").innerHTML = `
        <div id="results-header">
          <span>${filtered.length.toLocaleString()} videos</span>
        </div>
        ${disclaimer}
        <div id="grid">${filtered.map(renderCard).join("")}</div>`;
    }

    // ── unfiltered: carousels + era grid ─────────────────────────────────────
    function renderByType() {
      const active = ALL_VIDEOS.filter(v => v.status === "active");

      const carousels = ALL_TYPES.map(type => {
        const videos = active.filter(v => v.type === type);
        if (!videos.length) return "";
        const disclaimer = type === "Run BTS"
          ? `<p class="disclaimer">Run BTS originally aired on V LIVE and is not sorted by era.</p>`
          : "";
        return `
          <section class="carousel">
            <h2>${type} <span class="count">${videos.length}</span></h2>
            ${disclaimer}
            <div class="rail">${videos.slice(0, 20).map(renderCard).join("")}</div>
          </section>`;
      }).join("");

      const eraCards = ALL_ERAS.map(era => {
        const count = active.filter(v => v.era === era.name).length;
        if (!count) return "";
        return `
          <button class="era-card" data-era="${era.name}">
            <span class="era-name">${era.name}</span>
            <span class="era-count">${count} videos</span>
            <span class="era-year">${era.start.slice(0, 4)}</span>
          </button>`;
      }).join("");

      document.getElementById("results").innerHTML = carousels + `
        <section id="era-section">
          <h2>Browse by Era</h2>
          <div id="era-grid">${eraCards}</div>
        </section>`;

      document.querySelectorAll(".era-card").forEach(btn => {
        btn.addEventListener("click", () => {
          state.eraFrom = btn.dataset.era;
          state.eraTo   = btn.dataset.era;
          render();
        });
      });
    }

    // ── main render ──────────────────────────────────────────────────────────
    function render() {
      renderTypeDropdown();
      populateEraSelects();
      populateYearSelects();
      bindDropdowns();
      renderActiveFilters();
      isFiltered() ? renderFiltered() : renderByType();
    }

    // ── boot ─────────────────────────────────────────────────────────────────
    document.addEventListener("click", () => {
      document.getElementById("type-menu")?.classList.add("hidden");
    });

    Promise.all([
      fetch("data/videos.json").then(r => r.json()),
      fetch("data/eras.json").then(r => r.json()),
    ]).then(([videos, eras]) => {
      ALL_VIDEOS = videos;
      ALL_ERAS   = eras;
      ALL_TYPES  = [...new Set(videos.map(v => v.type))].sort();
      renderStats();
      render();
    }).catch(err => {
      document.getElementById("results").innerHTML = `<p>Error: ${err.message}</p>`;
    });
  </script>
</body>
</html>
