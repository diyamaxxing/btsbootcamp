<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Main MusterWA</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/home.css" />
</head>
<body>
  <nav>
    <a href="mainmuster.html"><strong>BTS Bootcamp</strong></a>
    <a href="pages/index.html">Browse →</a>
  </nav>

  <main>
    <div id="stats-bar"></div>
    <div id="era-carousel"></div>
    <div id="content"><p>Loading...</p></div>
  </main>

  <script>
    let ALL_VIDEOS = [];
    let ALL_ERAS   = [];
    let ALL_TYPES  = [];

    // ── utils ────────────────────────────────────────────────────────────────
    function fmtHours(sec) {
      const h = Math.floor(sec / 3600);
      const m = Math.floor((sec % 3600) / 60);
      return `${h.toLocaleString()}h ${m}m`;
    }

    function fmtViews(n) {
      if (!n) return "";
      if (n >= 1e9) return (n / 1e9).toFixed(1) + "B";
      if (n >= 1e6) return (n / 1e6).toFixed(1) + "M";
      if (n >= 1e3) return (n / 1e3).toFixed(1) + "K";
      return n.toString();
    }

    // ── scoring ──────────────────────────────────────────────────────────────
    // Phase 1: YouTube signals only.
    // Phase 2 (Issue #13): extend to scoreVideo(v, userProgress)
    function scoreVideo(v) {
      const views = Math.log10((v.view_count || 0) + 1);
      const likes = Math.log10((v.like_count || 0) + 1);
      return views * 0.7 + likes * 0.3;
    }

    function topN(videos, n) {
      return [...videos]
        .filter(v => v.status === "active")
        .sort((a, b) => scoreVideo(b) - scoreVideo(a))
        .slice(0, n);
    }

    function recentTopN(videos, n, days = 90) {
      const cutoff = new Date();
      cutoff.setDate(cutoff.getDate() - days);
      const cutoffStr = cutoff.toISOString().slice(0, 10);
      const recent = videos.filter(v => v.air_date && v.air_date >= cutoffStr);
      return topN(recent.length >= n ? recent : videos, n);
    }

    // ── stats bar ────────────────────────────────────────────────────────────
    function renderStats() {
      const active   = ALL_VIDEOS.filter(v => v.status === "active");
      const totalSec = active.reduce((s, v) => s + (v.duration_sec || 0), 0);
      const eras     = new Set(active.map(v => v.era).filter(Boolean)).size;
      const since    = active.filter(v => v.air_date).sort((a, b) => a.air_date.localeCompare(b.air_date))[0];

      const typeCounts = ALL_TYPES.map(t => {
        const n = active.filter(v => v.type === t).length;
        return `<div class="stat"><span class="stat-num">${n.toLocaleString()}</span><span class="stat-label">${t}s</span></div>`;
      }).join("");

      document.getElementById("stats-bar").innerHTML = `
        <section id="stats">
          <div class="stat"><span class="stat-num">${active.length.toLocaleString()}</span><span class="stat-label">Videos</span></div>
          ${typeCounts}
          <div class="stat"><span class="stat-num">${fmtHours(totalSec)}</span><span class="stat-label">Total Runtime</span></div>
          <div class="stat"><span class="stat-num">${eras}</span><span class="stat-label">Eras</span></div>
          <div class="stat"><span class="stat-num">${since ? since.air_date.slice(0, 4) : "—"}</span><span class="stat-label">Since</span></div>
        </section>`;
    }

    // ── era carousel — navigates to browse page with era pre-set ─────────────
    function renderEraCarousel() {
      const active = ALL_VIDEOS.filter(v => v.status === "active");
      const pills  = ALL_ERAS.map(era => {
        const count = active.filter(v => v.era === era.name).length;
        if (!count) return "";
        return `<a class="era-pill" href="pages/index.html?eraFrom=${encodeURIComponent(era.name)}&eraTo=${encodeURIComponent(era.name)}">
          ${era.name}
          <span class="era-pill-count">${count}</span>
        </a>`;
      }).join("");
      document.getElementById("era-carousel").innerHTML = `<div id="era-rail">${pills}</div>`;
    }

    // ── cards ────────────────────────────────────────────────────────────────
    function renderCard(v) {
      const meta = [v.era, fmtViews(v.view_count) ? fmtViews(v.view_count) + " views" : ""].filter(Boolean).join(" · ");
      return `
        <a class="card" href="pages/player.html?id=${encodeURIComponent(v.id)}">
          <img src="${v.thumbnail}" alt="${v.title}" loading="lazy" />
          <p class="card-title">${v.title}</p>
          ${meta ? `<p class="card-meta">${meta}</p>` : ""}
        </a>`;
    }

    // ── hero ─────────────────────────────────────────────────────────────────
    function renderHero(active) {
      const hero = recentTopN(active, 1)[0];
      if (!hero) return "";
      return `
        <section id="hero">
          <a href="pages/player.html?id=${encodeURIComponent(hero.id)}">
            <img src="${hero.thumbnail}" alt="${hero.title}" />
            <div id="hero-meta">
              <p id="hero-type">${hero.type}${hero.era ? ` · ${hero.era}` : ""}</p>
              <h2>${hero.title}</h2>
              <p id="hero-stats">${(hero.view_count || 0).toLocaleString()} views · ${(hero.like_count || 0).toLocaleString()} likes</p>
            </div>
          </a>
        </section>`;
    }

    // ── carousels ────────────────────────────────────────────────────────────
    function renderCarousel(title, videos, disclaimer = "") {
      if (!videos.length) return "";
      return `
        <section class="carousel">
          <h2>${title}</h2>
          ${disclaimer}
          <div class="rail">${videos.map(renderCard).join("")}</div>
        </section>`;
    }

    // ── era grid — links to browse page with filter pre-set ──────────────────
    function renderEraGrid(active) {
      const cards = ALL_ERAS.map(era => {
        const count = active.filter(v => v.era === era.name).length;
        if (!count) return "";
        return `
          <a class="era-card" href="pages/index.html?eraFrom=${encodeURIComponent(era.name)}&eraTo=${encodeURIComponent(era.name)}">
            <span class="era-name">${era.name}</span>
            <span class="era-count">${count} videos</span>
            <span class="era-year">${era.start.slice(0, 4)}</span>
          </a>`;
      }).join("");

      return `
        <section id="era-section">
          <h2>Browse by Era <a class="section-link" href="pages/index.html">Browse all →</a></h2>
          <div id="era-grid">${cards}</div>
        </section>`;
    }

    // ── main render ──────────────────────────────────────────────────────────
    function render() {
      const active    = ALL_VIDEOS.filter(v => v.status === "active");
      const trending  = topN(active, 20);
      const mostLoved = [...active].sort((a, b) => (b.like_count || 0) - (a.like_count || 0)).slice(0, 20);

      const typeCarousels = ALL_TYPES.map(type => {
        const inType = v => v.type === type || (v.tags || []).includes(type);
        const videos = [...active.filter(inType)]
          .sort((a, b) => scoreVideo(b) - scoreVideo(a))
          .slice(0, 20);
        const disclaimer = type === "Run BTS"
          ? `<p class="disclaimer">Originally aired on V LIVE — not sorted by era.</p>`
          : "";
        return renderCarousel(`${type} <span class="count">${active.filter(v => v.type === type).length}</span>`, videos, disclaimer);
      }).join("");

      document.getElementById("content").innerHTML =
        renderHero(active) +
        renderCarousel("Trending", trending) +
        renderCarousel("Most Loved", mostLoved) +
        typeCarousels +
        renderEraGrid(active);
    }

    // ── boot ─────────────────────────────────────────────────────────────────
    Promise.all([
      fetch("data/videos.json").then(r => r.json()),
      fetch("data/eras.json").then(r => r.json()),
    ]).then(([videos, eras]) => {
      ALL_VIDEOS = videos;
      ALL_ERAS   = eras;
      ALL_TYPES  = [...new Set(videos.map(v => v.type))].sort();
      renderStats();
      renderEraCarousel();
      render();
    }).catch(err => {
      document.getElementById("content").innerHTML = `<p>Error: ${err.message}</p>`;
    });
  </script>
</body>
</html>
